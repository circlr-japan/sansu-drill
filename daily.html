<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#2563EB;--blue-d:#1E40AF;--purple:#7C3AED;
  --green:#16A34A;--red:#DC2626;--amber:#D97706;
  --bg:#F0F4FF;--surface:#fff;--text:#1E293B;--muted:#64748B;
  --border:#E2E8F0;--radius:14px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 28px rgba(37,99,235,0.15);
}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100svh;-webkit-text-size-adjust:100%;}
@media(min-width:480px){body{max-width:540px;margin:0 auto;}}

/* ── アニメーション ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes slideIn{from{transform:translateX(-8px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(60px) rotate(360deg);opacity:0}}

/* ── ページ管理 ── */
.page{display:none;animation:fadeUp 0.35s ease;}
.page.active{display:block;}

/* ── ヘッダー ── */
.header{
  background:linear-gradient(135deg,var(--blue-d),var(--purple));
  padding:18px 16px 22px;color:#fff;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(30,64,175,0.25);
}
.header-row{display:flex;align-items:center;justify-content:space-between;}
.header a{color:rgba(255,255,255,0.8);font-size:12px;text-decoration:none;}
.header-title{font-size:17px;font-weight:700;}
.header-sub{font-size:11px;color:rgba(255,255,255,0.8);margin-top:3px;}

/* ── 設定ページ ── */
.content{padding:16px 16px 60px;}
.setup-card{background:var(--surface);border-radius:20px;padding:20px;box-shadow:var(--shadow-lg);margin-bottom:14px;}
.setup-card h2{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;}
.section-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.6px;text-transform:uppercase;margin-bottom:8px;}

.grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.sel-btn{
  border:2px solid var(--border);border-radius:10px;padding:10px 6px;
  text-align:center;cursor:pointer;background:var(--bg);
  transition:all 0.15s;font-family:'Noto Sans JP',sans-serif;
  -webkit-tap-highlight-color:transparent;
}
.sel-btn:active{transform:scale(0.95);}
.sel-btn.on{border-color:var(--blue);background:#EFF6FF;}
.sel-btn .big{font-size:20px;font-weight:700;display:block;}
.sel-btn .small{font-size:10px;color:var(--muted);display:block;margin-top:1px;}
.sel-btn.on .small{color:var(--blue);}

.diff-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.diff-btn{border:2px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;background:var(--bg);font-size:13px;font-weight:600;font-family:'Noto Sans JP',sans-serif;color:var(--muted);transition:all 0.15s;-webkit-tap-highlight-color:transparent;display:flex;flex-direction:column;align-items:center;gap:3px;}
.diff-btn small{font-size:9px;font-weight:400;}
.diff-btn:active{transform:scale(0.95);}
.diff-btn.on{border-color:var(--purple);background:var(--purple-light,#F5F3FF);color:var(--purple);}

/* 回数選択（サブスクのみ） */
.freq-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.freq-btn{border:2px solid var(--border);border-radius:10px;padding:12px 6px;text-align:center;cursor:pointer;background:var(--bg);transition:all 0.15s;-webkit-tap-highlight-color:transparent;}
.freq-btn .num{font-size:24px;font-weight:700;color:var(--muted);}
.freq-btn .lbl{font-size:10px;color:var(--muted);}
.freq-btn.on{border-color:var(--purple);background:#F5F3FF;}
.freq-btn.on .num,.freq-btn.on .lbl{color:var(--purple);}
.freq-btn:active{transform:scale(0.95);}

.plan-info{background:linear-gradient(135deg,#F5F3FF,#EEF2FF);border:1.5px solid #DDD6FE;border-radius:12px;padding:12px 14px;font-size:12px;color:#5B21B6;line-height:1.7;margin-bottom:14px;}
.plan-info a{color:var(--purple);font-weight:700;}

.btn-start{
  width:100%;padding:17px;
  background:linear-gradient(135deg,var(--blue),#3B82F6);
  color:#fff;border:none;border-radius:var(--radius);
  font-size:16px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;box-shadow:0 6px 20px rgba(37,99,235,0.3);
  transition:transform 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;
  -webkit-tap-highlight-color:transparent;
}
.btn-start:active{transform:scale(0.98);}
.btn-start:disabled{background:#CBD5E1;box-shadow:none;cursor:not-allowed;}

/* ── 今日の状態バナー ── */
.done-banner{
  background:linear-gradient(135deg,#F0FDF4,#ECFDF5);
  border:1.5px solid #86EFAC;border-radius:16px;
  padding:18px;text-align:center;margin-bottom:14px;
}
.done-banner .icon{font-size:40px;margin-bottom:8px;}
.done-banner h3{font-size:16px;font-weight:700;color:#166534;margin-bottom:4px;}
.done-banner p{font-size:13px;color:#166534;line-height:1.7;}
.remaining-chip{display:inline-block;background:#ECFDF5;color:#166534;border:1px solid #86EFAC;border-radius:999px;padding:4px 14px;font-size:12px;font-weight:700;margin-top:8px;}

/* ── ドリルページ ── */
#drillPage{background:var(--bg);}
.drill-header{
  background:linear-gradient(135deg,var(--blue-d),var(--purple));
  padding:14px 16px;color:#fff;position:sticky;top:0;z-index:100;
}
.drill-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.drill-title{font-size:14px;font-weight:700;}
.drill-meta{font-size:11px;color:rgba(255,255,255,0.85);}
.progress-bar{height:5px;background:rgba(255,255,255,0.25);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:#fff;border-radius:99px;transition:width 0.3s ease;}

.q-wrap{padding:12px 12px 80px;}
.q-card{
  background:var(--surface);border-radius:16px;
  padding:16px 14px;margin-bottom:10px;
  box-shadow:0 1px 8px rgba(0,0,0,0.06);
  animation:slideIn 0.2s ease;
  border:2px solid transparent;
  transition:border-color 0.2s;
}
.q-card.correct{border-color:var(--green);background:#F0FDF4;}
.q-card.wrong{border-color:var(--red);background:#FEF2F2;animation:shake 0.3s ease;}
.q-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.q-num{
  min-width:28px;height:28px;background:var(--blue);color:#fff;
  border-radius:50%;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.q-card.correct .q-num{background:var(--green);}
.q-card.wrong .q-num{background:var(--red);}
.q-text{font-size:18px;font-weight:700;color:var(--text);line-height:1.4;}
.q-input-row{display:flex;gap:8px;align-items:center;}
.q-input{
  flex:1;border:2px solid var(--border);border-radius:10px;
  padding:11px 12px;font-size:20px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;color:var(--text);
  background:#F8FAFC;text-align:center;outline:none;
  transition:border-color 0.15s;-webkit-appearance:none;
}
.q-input:focus{border-color:var(--blue);background:#fff;}
.q-card.correct .q-input{border-color:var(--green);background:#F0FDF4;color:var(--green);}
.q-card.wrong .q-input{border-color:var(--red);background:#FEF2F2;color:var(--red);}
.q-result{font-size:13px;font-weight:700;margin-top:6px;display:none;}
.q-card.correct .q-result{display:block;color:var(--green);}
.q-card.wrong .q-result{display:block;color:var(--red);}

/* 送信バー（固定） */
.submit-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  padding:12px 16px 20px;z-index:200;
  max-width:540px;margin:0 auto;
}
.btn-submit{
  width:100%;padding:16px;
  background:linear-gradient(135deg,var(--blue),#3B82F6);
  color:#fff;border:none;border-radius:var(--radius);
  font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,0.25);
  -webkit-tap-highlight-color:transparent;
}
.btn-submit:disabled{background:#CBD5E1;box-shadow:none;}

/* ── 結果ページ ── */
#resultPage{min-height:100svh;}
.result-hero{
  background:linear-gradient(135deg,var(--blue-d) 0%,var(--purple) 100%);
  padding:32px 20px 28px;text-align:center;color:#fff;
}
.result-score{font-size:72px;font-weight:700;line-height:1;margin:16px 0 4px;animation:pop 0.5s ease;}
.result-label{font-size:14px;color:rgba(255,255,255,0.85);}
.result-grade{font-size:13px;color:rgba(255,255,255,0.8);margin-top:6px;}

.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 16px 0;}
.stat-box{background:var(--surface);border-radius:12px;padding:14px 8px;text-align:center;box-shadow:var(--shadow);}
.stat-num{font-size:26px;font-weight:700;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.stat-num.ok{color:var(--green);}
.stat-num.ng{color:var(--red);}
.stat-num.tm{color:var(--blue);}

.review-section{padding:14px 16px;}
.review-section h3{font-size:14px;font-weight:700;margin-bottom:10px;}
.review-item{
  background:var(--surface);border-radius:12px;padding:12px 14px;
  margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,0.05);
  border-left:4px solid var(--border);
}
.review-item.ok{border-left-color:var(--green);background:#F0FDF4;}
.review-item.ng{border-left-color:var(--red);background:#FEF2F2;}
.review-q{font-size:14px;font-weight:600;color:var(--text);}
.review-ans{font-size:12px;margin-top:4px;}
.review-ans .ok-a{color:var(--green);font-weight:700;}
.review-ans .ng-a{color:var(--red);}

/* 履歴セクション */
.history-section{padding:0 16px 16px;}
.history-section h3{font-size:14px;font-weight:700;margin-bottom:10px;}
.history-item{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border-radius:10px;padding:10px 12px;
  margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.history-date{font-size:11px;color:var(--muted);min-width:56px;}
.history-score{font-size:16px;font-weight:700;min-width:44px;}
.history-bar{flex:1;height:6px;background:#E2E8F0;border-radius:99px;overflow:hidden;}
.history-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width 0.5s ease;}
.history-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;}
.badge-s{background:#FEF9C3;color:#CA8A04;}
.badge-a{background:#DCFCE7;color:#16A34A;}
.badge-b{background:#DBEAFE;color:#2563EB;}
.badge-c{background:#F3F4F6;color:#6B7280;}

.result-actions{padding:0 16px 40px;display:grid;gap:10px;}
.btn-action{
  width:100%;padding:15px;border:none;border-radius:var(--radius);
  font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.btn-again{background:linear-gradient(135deg,var(--blue),#3B82F6);color:#fff;box-shadow:0 4px 14px rgba(37,99,235,0.25);}
.btn-home{background:var(--surface);color:var(--blue);border:1.5px solid var(--border);}

/* 分数・比入力 */
.frac-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;}
.frac-line{width:60%;height:2px;background:var(--text);border-radius:1px;}
.frac-input{
  width:100%;border:2px solid var(--border);border-radius:8px;
  padding:7px 4px;font-size:16px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;text-align:center;
  background:#F8FAFC;outline:none;-webkit-appearance:none;
}
.frac-input:focus{border-color:var(--blue);}
.ratio-wrap{display:flex;align-items:center;gap:6px;flex:1;}
.ratio-sep{font-size:18px;font-weight:700;color:var(--muted);}

/* 処理中インジケータ */
.saving-dot{display:inline-block;width:6px;height:6px;background:var(--muted);border-radius:50%;animation:pulse 1s infinite;}
</style>
</head>
<body>

<!-- ══════════════ 設定ページ ══════════════ -->
<div class="page active" id="setupPage">
  <div class="header">
    <div class="header-row">
      <a href="/index.html">← トップ</a>
      <span class="header-title">📅 今日のドリル</span>
      <span style="font-size:11px;color:rgba(255,255,255,0.7);" id="headerDate"></span>
    </div>
  </div>

  <div class="content">
    <!-- 今日の完了バナー（完了時のみ表示） -->
    <div id="doneBanner" class="done-banner" style="display:none;">
      <div class="icon">🎉</div>
      <h3>今日のドリル完了！</h3>
      <p id="doneMessage">お疲れさまでした。</p>
      <span class="remaining-chip" id="remainingChip"></span>
    </div>

    <!-- プラン情報 -->
    <div class="plan-info" id="planInfo"></div>

    <!-- 学年設定 -->
    <div class="setup-card">
      <h2>⚙️ ドリル設定</h2>
      <div class="section-label">学年</div>
      <div class="grade-grid" style="margin-bottom:14px;">
        <div class="sel-btn" id="g1" onclick="setGrade(1)"><span class="big">1年</span><span class="small">小学1年生</span></div>
        <div class="sel-btn" id="g2" onclick="setGrade(2)"><span class="big">2年</span><span class="small">小学2年生</span></div>
        <div class="sel-btn" id="g3" onclick="setGrade(3)"><span class="big">3年</span><span class="small">小学3年生</span></div>
        <div class="sel-btn" id="g4" onclick="setGrade(4)"><span class="big">4年</span><span class="small">小学4年生</span></div>
        <div class="sel-btn" id="g5" onclick="setGrade(5)"><span class="big">5年</span><span class="small">小学5年生</span></div>
        <div class="sel-btn" id="g6" onclick="setGrade(6)"><span class="big">6年</span><span class="small">小学6年生</span></div>
      </div>
      <div class="section-label">難易度</div>
      <div class="diff-grid" style="margin-bottom:14px;">
        <button class="diff-btn" id="de" onclick="setDiff('easy')">🌱 初級<small>やさしい</small></button>
        <button class="diff-btn" id="dn" onclick="setDiff('normal')">⭐ 中級<small>標準</small></button>
        <button class="diff-btn" id="dh" onclick="setDiff('hard')">🔥 上級<small>むずかしい</small></button>
      </div>

      <!-- サブスク：回数設定 -->
      <div id="freqSection" style="display:none;">
        <div class="section-label">1日の回数</div>
        <div class="freq-grid">
          <div class="freq-btn" id="f1" onclick="setFreq(1)"><div class="num">1</div><div class="lbl">回/日</div></div>
          <div class="freq-btn" id="f2" onclick="setFreq(2)"><div class="num">2</div><div class="lbl">回/日</div></div>
          <div class="freq-btn" id="f3" onclick="setFreq(3)"><div class="num">3</div><div class="lbl">回/日</div></div>
        </div>
      </div>
    </div>

    <button class="btn-start" id="btnStart" onclick="startDrill()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 3l14 9-14 9V3z"/></svg>
      今日のドリルを始める
    </button>

    <!-- 学習履歴（サブスクのみ） -->
    <div class="history-section" id="historySection" style="display:none;padding:14px 0 0;">
      <h3>📈 最近の履歴</h3>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<!-- ══════════════ ドリルページ ══════════════ -->
<div class="page" id="drillPage">
  <div class="drill-header">
    <div class="drill-header-row">
      <span class="drill-title" id="drillTitle">今日のドリル</span>
      <span class="drill-meta" id="drillMeta"></span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="drillProgress" style="width:0%"></div>
    </div>
  </div>
  <div class="q-wrap" id="qWrap"></div>
  <div class="submit-bar">
    <button class="btn-submit" id="btnSubmit" onclick="submitDrill()">
      採点する
    </button>
  </div>
</div>

<!-- ══════════════ 結果ページ ══════════════ -->
<div class="page" id="resultPage">
  <div class="result-hero">
    <div style="font-size:13px;color:rgba(255,255,255,0.8);" id="resultDate"></div>
    <div class="result-score" id="resultScore">0</div>
    <div class="result-label">点（40問中 <span id="resultCorrect">0</span> 問正解）</div>
    <div class="result-grade" id="resultGrade"></div>
  </div>

  <div class="result-stats">
    <div class="stat-box"><div class="stat-num ok" id="statOk">0</div><div class="stat-lbl">正解</div></div>
    <div class="stat-box"><div class="stat-num ng" id="statNg">0</div><div class="stat-lbl">不正解</div></div>
    <div class="stat-box"><div class="stat-num tm" id="statTime">0:00</div><div class="stat-lbl">所要時間</div></div>
  </div>

  <div class="review-section">
    <h3>📋 解答確認</h3>
    <div id="reviewList"></div>
  </div>

  <div class="history-section" id="resultHistorySection" style="display:none;">
    <h3>📈 学習履歴</h3>
    <div id="resultHistoryList"></div>
  </div>

  <div class="result-actions">
    <button class="btn-action btn-again" onclick="startDrill()">もう一度やる</button>
    <button class="btn-action btn-home" onclick="showPage('setupPage')">設定に戻る</button>
    <a href="/index.html" style="display:block;width:100%;padding:15px;border-radius:14px;text-align:center;font-size:14px;font-weight:700;color:var(--muted);border:1.5px solid var(--border);background:var(--surface);text-decoration:none;">トップへ戻る</a>
  </div>
</div>

<script>
// ============================================================
// 問題生成
// ============================================================
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function gcd(a,b){return b===0?a:gcd(b,a%b);}
function fracStr(n,d){const g=gcd(Math.abs(n),Math.abs(d));const sn=n/g,sd=d/g;if(sd===1)return String(sn);return`${sn}/${sd}`;}

const GRADES={
  1:{label:'小学1年生',generators:{

// ============================================================
// 状態管理
// ============================================================
const TODAY = new Date().toISOString().slice(0,10);
const TOTAL = 40;

// localStorage キー
const KEY_GRADE  = 'daily_grade';
const KEY_DIFF   = 'daily_diff';
const KEY_FREQ   = 'daily_freq';   // サブスクのみ
const KEY_DONE   = 'daily_done_'; // + TODAY → 完了回数

let grade = parseInt(localStorage.getItem(KEY_GRADE)||'1',10);
let diff  = localStorage.getItem(KEY_DIFF)||'normal';
let freq  = parseInt(localStorage.getItem(KEY_FREQ)||'1',10);
let questions = [];
let startTime = 0;

// プラン判定
function getPlan(){
  // サブスクの場合: sessionStorageにnijumaru_active_plan=sub or auth済み
  const plan = sessionStorage.getItem('nijumaru_active_plan');
  const auth  = sessionStorage.getItem('nijumaru_premium_auth');
  if(plan === 'sub' || plan === 'trial') return 'sub';
  // サブスクのトライアル中も含む
  const trial = localStorage.getItem('nijumaru_trial_start');
  if(trial && Date.now() - parseInt(trial,10) < 86400000) return 'sub';
  if(auth === '1') return 'sub';
  return 'free';
}

// 今日の完了回数
function getDoneCount(){ return parseInt(localStorage.getItem(KEY_DONE+TODAY)||'0',10); }
function addDoneCount(){ localStorage.setItem(KEY_DONE+TODAY, String(getDoneCount()+1)); }

// 上限回数
function getLimit(){ return getPlan()==='sub' ? freq : 1; }

// 今日まだやれるか
function canDo(){ return getDoneCount() < getLimit(); }

// ============================================================
// UI 初期化
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  // 日付表示
  const d = new Date();
  document.getElementById('headerDate').textContent =
    `${d.getMonth()+1}月${d.getDate()}日（${'日月火水木金土'[d.getDay()]}）`;

  applySettings();
  renderPlanInfo();
  checkDoneState();
  renderHistory();
});

function applySettings(){
  document.querySelectorAll('.sel-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('g'+grade)?.classList.add('on');
  ['de','dn','dh'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
  document.getElementById({easy:'de',normal:'dn',hard:'dh'}[diff])?.classList.add('on');
  if(getPlan()==='sub'){
    document.getElementById('freqSection').style.display='block';
    [1,2,3].forEach(n=>{
      document.getElementById('f'+n)?.classList.toggle('on', n===freq);
    });
  }
}

function renderPlanInfo(){
  const el = document.getElementById('planInfo');
  const plan = getPlan();
  const done = getDoneCount();
  const limit = getLimit();
  if(plan==='sub'){
    el.innerHTML = `👑 サブスクプラン｜本日 ${done}/${limit} 回完了`;
  } else {
    el.innerHTML = `無料版｜1日1回・学習履歴は保存されません。<br>
      <a href="/premium.html">サブスクプラン（¥300/月）</a>で1日3回＋履歴保存が使えます。`;
  }
}

function checkDoneState(){
  const banner = document.getElementById('doneBanner');
  const btn = document.getElementById('btnStart');
  const done = getDoneCount();
  const limit = getLimit();

  if(!canDo()){
    banner.style.display='block';
    document.getElementById('doneMessage').textContent =
      getPlan()==='sub'
        ? `本日の設定回数（${limit}回）をすべて完了しました！`
        : '明日また挑戦しよう！';
    document.getElementById('remainingChip').textContent =
      getPlan()==='sub' ? `${done}/${limit}回完了` : '明日0時にリセット';
    btn.disabled = true;
    btn.textContent = '本日は完了しました';
  } else {
    banner.style.display='none';
    btn.disabled = false;
    const rem = limit - done;
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 3l14 9-14 9V3z"/></svg>
      今日のドリルを始める（残り${rem}回）`;
  }
}

function setGrade(g){ grade=g; localStorage.setItem(KEY_GRADE,g); applySettings(); }
function setDiff(d){ diff=d;  localStorage.setItem(KEY_DIFF,d);  applySettings(); }
function setFreq(f){ freq=f;  localStorage.setItem(KEY_FREQ,f);  applySettings(); renderPlanInfo(); checkDoneState(); }

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ============================================================
// ドリル開始
// ============================================================
function generateQuestions(){
  const gens = GRADES[grade].generators[diff];
  const qs = [];
  const seen = new Set();
  let retry = 0;
  while(qs.length < TOTAL && retry < TOTAL*12){
    const q = gens[Math.floor(Math.random()*gens.length)]();
    if(!seen.has(q.q)){ seen.add(q.q); qs.push(q); }
    retry++;
  }
  while(qs.length < TOTAL) qs.push(gens[Math.floor(Math.random()*gens.length)]());
  for(let i=qs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[qs[i],qs[j]]=[qs[j],qs[i]];}
  return qs;
}

function isFrac(v){ return typeof v==='string'&&v.includes('/'); }
function isRatio(v){ return typeof v==='string'&&(v.includes(':')||v.includes('：')); }
function isDecimal(v){ return !isFrac(v)&&!isRatio(v)&&String(v).includes('.'); }

function startDrill(){
  if(!canDo()) return;
  questions = generateQuestions();
  startTime = Date.now();
  renderDrill();
  document.getElementById('drillTitle').textContent =
    `${GRADES[grade].label}　${['🌱 初級','⭐ 中級','🔥 上級'][['easy','normal','hard'].indexOf(diff)]}`;
  document.getElementById('drillMeta').textContent = `40問`;
  showPage('drillPage');
}

function renderDrill(){
  const wrap = document.getElementById('qWrap');
  wrap.innerHTML = '';
  questions.forEach((q,i)=>{
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'qc'+i;

    let inputHTML;
    if(isFrac(String(q.a))){
      inputHTML = `<div class="frac-wrap">
        <input class="frac-input" id="qn${i}" type="text" inputmode="numeric" placeholder="分子" maxlength="6">
        <div class="frac-line"></div>
        <input class="frac-input" id="qd${i}" type="text" inputmode="numeric" placeholder="分母" maxlength="6">
      </div>`;
    } else if(isRatio(String(q.a))){
      inputHTML = `<div class="ratio-wrap">
        <input class="q-input" id="qa${i}" type="text" inputmode="numeric" placeholder="左" maxlength="6" style="text-align:center;">
        <span class="ratio-sep">：</span>
        <input class="q-input" id="qb${i}" type="text" inputmode="numeric" placeholder="右" maxlength="6" style="text-align:center;">
      </div>`;
    } else {
      const mode = isDecimal(q.a) ? 'decimal' : 'numeric';
      inputHTML = `<input class="q-input" id="qi${i}" type="text" inputmode="${mode}" placeholder="答え" maxlength="10">`;
    }

    card.innerHTML = `
      <div class="q-head">
        <div class="q-num">${i+1}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="q-input-row">${inputHTML}</div>
      <div class="q-result" id="qr${i}"></div>`;
    wrap.appendChild(card);
  });
  document.getElementById('drillProgress').style.width = '0%';
}

// ============================================================
// 採点
// ============================================================
function checkAnswer(user, correct){
  if(!user || user.trim()==='') return false;
  const u = user.trim().replace(/\s/g,'').replace(/：/g,':');
  const c = String(correct).trim().replace(/\s/g,'').replace(/：/g,':');
  if(!isNaN(+u) && !isNaN(+c)) return Math.abs(+u - +c) < 0.001;
  return u === c;
}

function getUserAnswer(i, q){
  const a = q.a;
  if(isFrac(String(a))){
    const n = (document.getElementById('qn'+i)?.value||'').trim();
    const d = (document.getElementById('qd'+i)?.value||'').trim();
    if(!n||!d) return '';
    const g = gcd(Math.abs(parseInt(n)||1), Math.abs(parseInt(d)||1));
    return `${parseInt(n)/g}/${parseInt(d)/g}`;
  } else if(isRatio(String(a))){
    const av = (document.getElementById('qa'+i)?.value||'').trim();
    const bv = (document.getElementById('qb'+i)?.value||'').trim();
    if(!av||!bv) return '';
    return `${av}:${bv}`;
  } else {
    return (document.getElementById('qi'+i)?.value||'').trim();
  }
}

function submitDrill(){
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = '採点中...';

  let correct = 0;
  const results = [];

  questions.forEach((q,i)=>{
    const user = getUserAnswer(i, q);
    const ok   = checkAnswer(user, q.a);
    if(ok) correct++;

    const card = document.getElementById('qc'+i);
    card.classList.add(ok ? 'correct' : 'wrong');

    // 色変え（入力欄）
    const inputs = card.querySelectorAll('input');
    inputs.forEach(el => { el.readOnly = true; });

    const resEl = document.getElementById('qr'+i);
    resEl.textContent = ok ? '✓ 正解' : `✗ 正解: ${q.a}`;

    results.push({ q:q.q, a:q.a, user, ok, type:q.type||'' });

    // プログレス更新
    document.getElementById('drillProgress').style.width = `${((i+1)/TOTAL)*100}%`;
  });

  const elapsed = Math.round((Date.now() - startTime) / 1000);
  const score   = Math.round(correct / TOTAL * 100);

  // カウントアップ
  addDoneCount();

  // 結果表示
  setTimeout(() => showResult(score, correct, TOTAL-correct, elapsed, results), 400);
}

// ============================================================
// 結果表示
// ============================================================
function formatTime(s){ const m=Math.floor(s/60); return m+':'+String(s%60).padStart(2,'0'); }

function getGrade(score){
  if(score===100) return {rank:'S',label:'完璧！',cls:'badge-s'};
  if(score>=88)   return {rank:'A',label:'優秀！',cls:'badge-a'};
  if(score>=72)   return {rank:'B',label:'よくできました',cls:'badge-b'};
  return              {rank:'C',label:'もう少し',cls:'badge-c'};
}

function showResult(score, ok, ng, elapsed, results){
  const g = getGrade(score);
  document.getElementById('resultScore').textContent   = score;
  document.getElementById('resultCorrect').textContent = ok;
  document.getElementById('resultDate').textContent    =
    new Date().toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
  document.getElementById('resultGrade').innerHTML     =
    `<span class="history-badge ${g.cls}">${g.rank} ${g.label}</span>`;
  document.getElementById('statOk').textContent   = ok;
  document.getElementById('statNg').textContent   = ng;
  document.getElementById('statTime').textContent = formatTime(elapsed);

  // 解答確認
  const rev = document.getElementById('reviewList');
  rev.innerHTML = '';
  results.forEach((r,i)=>{
    const d = document.createElement('div');
    d.className = 'review-item ' + (r.ok ? 'ok' : 'ng');
    d.innerHTML = `
      <div class="review-q">${i+1}. ${r.q}</div>
      <div class="review-ans">
        ${r.ok
          ? `<span class="ok-a">✓ ${r.a}</span>`
          : `あなたの答え: <span class="ng-a">${r.user||'（未入力）'}</span>　正解: <span class="ok-a">${r.a}</span>`}
      </div>`;
    rev.appendChild(d);
  });

  // Firebase 履歴保存（サブスクのみ）
  if(getPlan()==='sub'){
    saveHistory({ date:TODAY, score, ok, ng, elapsed, grade, diff, rank:g.rank });
    document.getElementById('resultHistorySection').style.display='block';
    loadResultHistory();
  }

  showPage('resultPage');
  checkDoneState(); // 設定ページの状態を更新しておく
}

// ============================================================
// Firebase 学習履歴
// ============================================================
// DB パス: dailyHistory/{userId}/{date}_{timestamp}
// userId は端末固有ID（localStorage で管理）

function getUserId(){
  let id = localStorage.getItem('nijumaru_uid');
  if(!id){
    id = 'u' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    localStorage.setItem('nijumaru_uid', id);
  }
  return id;
}

async function saveHistory(data){
  if(!window._fbDb) return;
  try{
    const uid  = getUserId();
    const key  = `${data.date}_${Date.now()}`;
    const path = `dailyHistory/${uid}/${key}`;
    await window._fbSet(window._fbRef(window._fbDb, path), {
      ...data,
      ts: Date.now(),
    });
  }catch(e){ console.warn('履歴保存失敗:', e); }
}

async function getHistory(limit=10){
  if(!window._fbDb) return [];
  try{
    const uid  = getUserId();
    const snap = await window._fbGet(window._fbRef(window._fbDb, `dailyHistory/${uid}`));
    if(!snap.exists()) return [];
    const entries = [];
    snap.forEach(child => { entries.push(child.val()); });
    entries.sort((a,b)=>b.ts-a.ts);
    return entries.slice(0, limit);
  }catch(e){ return []; }
}

function renderHistoryList(list, containerId){
  const el = document.getElementById(containerId);
  if(!el) return;
  if(list.length===0){
    el.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px 0;">まだ記録がありません</div>';
    return;
  }
  el.innerHTML = list.map(r=>{
    const g = getGrade(r.score);
    const d = r.date ? r.date.slice(5).replace('-','/') : '';
    return `<div class="history-item">
      <div class="history-date">${d}</div>
      <div class="history-score" style="color:${r.score>=80?'var(--green)':r.score>=60?'var(--blue)':'var(--red)'}">${r.score}点</div>
      <div class="history-bar"><div class="history-bar-fill" style="width:${r.score}%"></div></div>
      <span class="history-badge ${g.cls}">${g.rank}</span>
    </div>`;
  }).join('');
}

async function renderHistory(){
  if(getPlan()!=='sub') return;
  document.getElementById('historySection').style.display='block';
  const list = await getHistory(7);
  renderHistoryList(list, 'historyList');
}

async function loadResultHistory(){
  const list = await getHistory(10);
  renderHistoryList(list, 'resultHistoryList');
}
